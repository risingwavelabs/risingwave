auto-retry: &auto-retry
  automatic:
    # Agent terminated because the AWS EC2 spot instance killed by AWS.
    - signal_reason: agent_stop
      limit: 3
    - exit_status: -1
      signal_reason: none
      limit: 3

env:
  IMAGE_NAME: "risectl"
  DOCKER_FILE: "docker/Dockerfile.risectl"

steps:
  - label: "docker-build-push-risectl: amd64"
    if: build.env("SKIP_TARGET_AMD64") != "true"
    command: "ci/scripts/docker.sh"
    key: "build-amd64"
    plugins:
      - seek-oss/aws-sm#v2.3.2:
          env:
            GHCR_USERNAME: ghcr-username
            GHCR_TOKEN: ghcr-token
            DOCKER_TOKEN: docker-token
            GITHUB_TOKEN: github-token
    retry: *auto-retry

  - label: "docker-build-push-risectl: aarch64"
    if: build.env("SKIP_TARGET_AARCH64") != "true"
    command: "ci/scripts/docker.sh"
    key: "build-aarch64"
    plugins:
      - seek-oss/aws-sm#v2.3.2:
          env:
            GHCR_USERNAME: ghcr-username
            GHCR_TOKEN: ghcr-token
            DOCKER_TOKEN: docker-token
            GITHUB_TOKEN: github-token
    agents:
      queue: "linux-arm64"
    retry: *auto-retry

  - label: "multi-arch-image-create-push-risectl"
    command: "ci/scripts/multi-arch-docker.sh"
    depends_on:
      - "build-amd64"
      - "build-aarch64"
    key: "multi-arch-image-create-push"
    plugins:
      - seek-oss/aws-sm#v2.3.2:
          env:
            GHCR_USERNAME: ghcr-username
            GHCR_TOKEN: ghcr-token
            DOCKER_TOKEN: docker-token
    retry: *auto-retry
