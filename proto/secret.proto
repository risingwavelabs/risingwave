syntax = "proto3";

package secret;

message SecretMetaBackend {
  bytes value = 1;
}

message VaultTokenAuth {
  string token = 1;
}

message VaultAppRoleAuth {
  string role_id = 1;
  string secret_id = 2;
}

message SecretHashicorpVaultBackend {
  string addr = 1;
  string path = 2;
  string field = 3; // default "value"
  oneof auth {
    VaultTokenAuth token_auth = 4;
    VaultAppRoleAuth approle_auth = 5;
  }
  bool tls_skip_verify = 6; // default false
}

message SecretAwsSecretsManagerBackend {
  string secret_id = 1;
  string region = 2;
  string field = 3;
  string version_id = 4;
  string version_stage = 5;
  string endpoint_url = 6;
  string access_key_id = 7;
  string secret_access_key = 8;
  string session_token = 9;
  string role_arn = 10;
  string external_id = 11;
  string profile = 12;
  SecretRef access_key_id_ref = 13;
  SecretRef secret_access_key_ref = 14;
  SecretRef session_token_ref = 15;
}

message Secret {
  // the message is stored in meta as encrypted bytes and is interpreted as bytes by catalog
  oneof secret_backend {
    SecretMetaBackend meta = 1;
    SecretHashicorpVaultBackend hashicorp_vault = 2;
    SecretAwsSecretsManagerBackend aws_secrets_manager = 3;
  }
}

message SecretRef {
  enum RefAsType {
    UNSPECIFIED = 0;
    TEXT = 1;
    // AS FILE
    FILE = 2;
  }
  uint32 secret_id = 1;
  RefAsType ref_as = 2;
}
