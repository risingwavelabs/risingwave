syntax = "proto3";

package iceberg_compaction;

option optimize_for = SPEED;

message SubscribeIcebergCompactionEventRequest {
  // Register provides the context_id of the corresponding Compactor.
  message Register {
    uint32 context_id = 1;
  }

  // PullTask provides the number of tasks needed for the Compactor.
  message PullTask {
    uint32 pull_task_count = 1;
  }

  message ReportTask {
    enum Status {
      UNSPECIFIED = 0;
      SUCCESS = 1;
      FAILED = 2;
    }

    uint64 task_id = 1;
    uint32 sink_id = 2;
    Status status = 3;
    reserved 4, 5;
    optional string error_message = 6;

    // The following three fields are populated only for pk-index coordinated
    // (no-commit) compaction tasks: the compactor performs the rewrite
    // without committing and reports the result here so that meta's
    // iceberg pk-index sink coordinator can perform the actual commit.
    // Absent for all other tasks.

    // serde_json-encoded `Vec<iceberg::spec::SerializedDataFile>` of the newly
    // written output data files produced by the rewrite.
    optional bytes pk_index_output_files = 7;
    // serde_json-encoded `Vec<String>` of the paths of all input files (data +
    // delete) consumed by the rewrite.
    optional bytes pk_index_input_files = 8;
    // The snapshot id the rewrite plan read from, used by the coordinator's
    // commit for optimistic-concurrency validation.
    optional int64 pk_index_read_snapshot_id = 9;
    // JSON array of absolute paths to the per-row provenance mapping file(s)
    // (one file per compaction plan admitted into this task) spilled by the
    // compactor via the iceberg table's `FileIO`. Each file contains
    // newline-delimited JSON objects `{input_file, input_pos, output_file,
    // output_pos}` describing how surviving input rows map to their new
    // location in the rewrite output. Meta's coordinator reads these back
    // through the same table's `FileIO` to reconcile concurrent deletes.
    optional string pk_index_mapping_path = 10;
  }

  oneof event {
    // Compactor will register its own context_id with Meta via Register and establish a bi-directional streaming rpc.
    Register register = 1;

    // Compactor will recalculate the number of tasks needed locally after receiving the PullTaskAck and get the next batch of tasks from Meta via PullTask.
    PullTask pull_task = 2;

    // Compactor reports the final task result back to Meta after all plans in the task finish.
    ReportTask report_task = 4;
  }

  uint64 create_at = 3;
}

message IcebergCompactionTask {
  uint64 task_id = 1;
  // Now we only support iceberg table full compaction.
  // compactor will get the information of the iceberg table from the properties
  map<string, string> props = 2;

  enum TaskType {
    UNSPECIFIED = 0;
    // Full compaction task.
    FULL = 1;

    // Small data file compaction task.
    SMALL_FILES = 2;

    FILES_WITH_DELETE = 3;
  }

  TaskType task_type = 3;
  uint32 sink_id = 4;

  // Whether this task should be routed through the meta-coordinated commit
  // path for iceberg pk-index sinks: the compactor performs the rewrite
  // without committing and reports the result back to meta instead.
  // True whenever the sink is a pk-index sink; coordinated compaction is
  // unconditional for pk-index sinks.
  bool pk_index_coordinated = 5;
}

message CancelCompactTask {
  uint64 task_id = 1;
}

message SubscribeIcebergCompactionEventResponse {
  // PullTaskAck is a response, the meta will return a PullTaskAck after distributing the task requested by the PullTask.
  // The Compactor receives the PullTaskAck and remakes its state and tries to initiate the next PullTask.
  message PullTaskAck {}

  oneof event {
    IcebergCompactionTask compact_task = 1;
    PullTaskAck pull_task_ack = 2;
    CancelCompactTask cancel_compact_task = 3;
  }

  uint64 create_at = 7;
}
