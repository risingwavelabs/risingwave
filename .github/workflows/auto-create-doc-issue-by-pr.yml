name: PR Documentation Checker

on:
  pull_request:
    types:
      - closed
      - labeled

permissions:
  contents: read
  pull-requests: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    outputs:
      should_process: ${{ steps.analyze.outputs.should_process }}
      canonical_pr_number: ${{ steps.analyze.outputs.canonical_pr_number }}
      reason: ${{ steps.analyze.outputs.reason }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}
      - name: Analyze documentation follow-up
        id: analyze
        run: |
          python3 .github/scripts/doc_issue_tracker.py analyze \
            --event-path "$GITHUB_EVENT_PATH" \
            --source-repo "$GITHUB_REPOSITORY"
        env:
          SOURCE_GITHUB_TOKEN: ${{ github.token }}

  track:
    needs: analyze
    if: needs.analyze.outputs.should_process == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: docs-issue-${{ github.repository }}-${{ needs.analyze.outputs.canonical_pr_number }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DOC_BOT_APP_ID }}
          private-key: ${{ secrets.DOC_BOT_APP_PRIVATE_KEY }}
          owner: risingwavelabs
          repositories: risingwave-docs

      - name: Create or update documentation issue
        id: track
        run: |
          python3 .github/scripts/doc_issue_tracker.py track \
            --event-path "$GITHUB_EVENT_PATH" \
            --source-repo "$GITHUB_REPOSITORY" \
            --docs-repo "risingwavelabs/risingwave-docs" \
            --canonical-pr-number "${{ needs.analyze.outputs.canonical_pr_number }}" \
            --source-token "$SOURCE_GITHUB_TOKEN" \
            --docs-token "$DOCS_GITHUB_TOKEN"
        env:
          SOURCE_GITHUB_TOKEN: ${{ github.token }}
          DOCS_GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Print result
        run: |
          echo "Analysis reason: ${{ needs.analyze.outputs.reason }}"
          echo "Canonical source PR: #${{ steps.track.outputs.canonical_pr_number }}"
          echo "Documentation issue action: ${{ steps.track.outputs.action }}"
          echo "Documentation issue: ${{ steps.track.outputs.issue_url }}"
