name: Package Version Checker

# Disabled on the dream-faster/risingwave fork: this check enforces that
# `main`'s Cargo.toml is bumped to the next minor whenever a `release-X.Y`
# branch exists on the remote. Useful upstream where releases are cut from
# this repo; pure noise on a fork that tracks upstream and applies local
# patches, since bumping the version would create rebase conflicts every
# time we pull in upstream commits.
#
# Re-enable by restoring the `pull_request` trigger below.

on:
  workflow_dispatch:
  # pull_request:
  #   branches:
  #     - 'main'

jobs:
  compare-package-version-with-latest-release-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Cargo.toml version bump for new release cycle
        shell: bash
        run: bash ci/scripts/package_version_check.sh --cargo-toml Cargo.toml
