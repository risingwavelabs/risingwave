name: Build & push fork docker image

# Builds the RisingWave server image on Ubicloud runners (matching the
# rest of dream-faster's GHA fleet) and pushes it to
# `ghcr.io/dream-faster/risingwave`. This is the dream-faster fork's
# replacement for upstream's Buildkite-backed `Build Docker Image` workflow,
# which requires secrets we don't have.
#
# Trigger surface (temporarily reduced — see below):
#   * manual `workflow_dispatch` -> publishes `:<branch-slug>` (and `:<custom-tag>` if provided)
#
# The push triggers (`main`, `claude/**`) are commented out because the
# default `GITHUB_TOKEN` issued for non-default-branch pushes can't do
# multipart uploads to GHCR — Docker's `docker/build-push-action` fails
# with `error writing layer blob: Could not authorize multipart upload`.
# To re-enable automatic builds we need a PAT with `write:packages` (see
# how `live-ingestion`'s workflows use `secrets.PAT`) wired in as a
# secret, then swap the `docker/login-action` `password` to use it and
# uncomment the `push:` block below.
#
# Tag slug rules: branch names have `/` -> `-` to satisfy the OCI tag grammar.
#
# Build profile defaults to `patch-production` (matches upstream's
# `fast_build` mode). A full `production` build is available via the
# workflow_dispatch input; expect ~2x runtime.

on:
  workflow_dispatch:
    inputs:
      cargo_profile:
        description: 'Cargo build profile'
        required: false
        default: 'patch-production'
        type: choice
        options:
          - patch-production
          - production
          - release
      extra_tag:
        description: 'Optional extra tag to publish (e.g. v0.0.1)'
        required: false
        type: string
  # push:
  #   branches:
  #     - main
  #     - 'claude/**'
  #   paths:
  #     - 'src/**'
  #     - 'proto/**'
  #     - 'Cargo.toml'
  #     - 'Cargo.lock'
  #     - 'rust-toolchain'
  #     - 'docker/Dockerfile'
  #     - '.github/workflows/build-and-push-fork-image.yml'

permissions:
  contents: read
  packages: write

concurrency:
  group: build-and-push-fork-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & push (amd64, ${{ inputs.cargo_profile || 'patch-production' }})
    # ubicloud-standard-8 = 8 vCPU / 16 GB RAM. Rust LLVM eats memory; if this
    # OOMs during linking, bump to ubicloud-standard-16.
    runs-on: ubicloud-standard-8

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: dream-faster/risingwave
      CARGO_PROFILE: ${{ inputs.cargo_profile || 'patch-production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # Fetch full history so the GIT_SHA build arg is meaningful.
        with:
          fetch-depth: 0

      - name: Free up disk space
        # Rust builds + jemalloc + Java binding pull ~30 GB of intermediates.
        # The default Ubicloud image has plenty of room, but this safety net
        # is cheap and keeps the same workflow portable across runner sizes.
        run: |
          set -euo pipefail
          df -h /
          docker system prune -af --volumes || true
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost /usr/local/lib/android || true
          df -h /

      - name: Set up QEMU
        # Only needed if we later add multi-arch. Cheap to keep here so a
        # future `platforms: linux/amd64,linux/arm64` line just works.
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute tags
        id: tags
        # Produces a comma-separated list of tags consumed by docker/build-push-action.
        # On a push to `claude/foo`, publishes:
        #   ghcr.io/dream-faster/risingwave:claude-foo
        #   ghcr.io/dream-faster/risingwave:claude-foo-<sha>
        # On a push to main:
        #   ghcr.io/dream-faster/risingwave:main
        #   ghcr.io/dream-faster/risingwave:main-<sha>
        #   ghcr.io/dream-faster/risingwave:latest
        run: |
          set -euo pipefail
          ref="${GITHUB_REF_NAME}"
          slug="${ref//\//-}"
          short_sha="${GITHUB_SHA::7}"

          tags=()
          tags+=("$REGISTRY/$IMAGE_NAME:$slug")
          tags+=("$REGISTRY/$IMAGE_NAME:$slug-$short_sha")
          if [ "$ref" = "main" ]; then
            tags+=("$REGISTRY/$IMAGE_NAME:latest")
          fi
          if [ -n "${{ inputs.extra_tag }}" ]; then
            tags+=("$REGISTRY/$IMAGE_NAME:${{ inputs.extra_tag }}")
          fi

          tag_list="$(IFS=,; echo "${tags[*]}")"
          echo "list=$tag_list" >> "$GITHUB_OUTPUT"
          echo "Will publish:" >&2
          for t in "${tags[@]}"; do echo "  $t" >&2; done

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.list }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            CARGO_PROFILE=${{ env.CARGO_PROFILE }}
          # GHA cache keeps the apt/node/dashboard build layers warm across
          # runs. The Rust `cargo build` step is the long pole and is NOT
          # cached today — adding `--mount=type=cache,target=...` mounts to
          # docker/Dockerfile would let buildx persist Cargo's target dir
          # too. Leave that to a follow-up so this workflow doesn't have to
          # ship Dockerfile changes.
          cache-from: type=gha,scope=fork-image
          cache-to: type=gha,scope=fork-image,mode=max
          provenance: false   # avoids the extra manifest that confuses some helm charts

      - name: Summary
        if: always()
        run: |
          {
            echo "## Image tags published"
            echo
            echo '```'
            echo "${{ steps.tags.outputs.list }}" | tr ',' '\n'
            echo '```'
            echo
            echo "Pull with: \`docker pull ghcr.io/dream-faster/risingwave:${GITHUB_REF_NAME//\//-}\`"
          } >> "$GITHUB_STEP_SUMMARY"
