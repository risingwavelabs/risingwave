name: Connector Node Integration Tests

# Disabled on the dream-faster/risingwave fork: this job is pinned to the
# upstream self-hosted runner label `risingwave-large` which is not
# registered on the fork, so every PR sits in `queued` indefinitely and
# blocks the mergeable_state from going `clean`. The job's only real work
# is gated on `java/**` or `proto/**` paths anyway — the fork's connector
# patches touch neither — so leaving the workflow idle costs nothing.
#
# Re-enable by restoring the `push` / `pull_request` / `merge_group`
# triggers below if/when the fork registers a `risingwave-large` runner
# (or the `runs-on` line is switched to `ubuntu-latest`).

on:
  workflow_dispatch:
  # push:
  #   branches: [ main ]
  # pull_request:
  #   branches: [ main ]
  # merge_group:
  #   types: [ checks_requested ]

jobs:
  build:
    runs-on: risingwave-large # this runner comes with more disk space, necessary for workflows that build RW
    strategy:
      matrix:
        java: [ '21' ]
    name: Java ${{ matrix.java }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            java:
              - 'java/**'
            proto:
              - 'proto/**'
      - name: Set up JDK ${{ matrix.java }}
        if: steps.filter.outputs.java == 'true' || steps.filter.outputs.proto == 'true'
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'adopt'
          cache: 'maven'
      - name: Setup Rust toolchain
        if: steps.filter.outputs.java == 'true' || steps.filter.outputs.proto == 'true'
        run: rustup show
      - name: Install build dependencies
        if: steps.filter.outputs.java == 'true' || steps.filter.outputs.proto == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y make build-essential cmake protobuf-compiler \
            libssl-dev libsasl2-dev libcurl4-openssl-dev pkg-config \
            lld libopenblas-dev liblapack-dev
      - name: run integration tests
        if: steps.filter.outputs.java == 'true' || steps.filter.outputs.proto == 'true'
        run: |
          set -ex

          RISINGWAVE_ROOT=${PWD}

          echo "--- build connector node with Rust native library"
          cd ${RISINGWAVE_ROOT}/java
          # Build with Rust to support OpendalSchemaHistory in MySQL CDC integration tests
          mvn --batch-mode --update-snapshots clean package
