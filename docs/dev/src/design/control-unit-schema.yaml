schema_version: control_unit/v1alpha1
kind: control_unit_catalog_entry

enums:
  unit_kind:
    - single_knob
    - family
    - bundle
  control_surface_type:
    - config
    - system_param
    - session_param
    - other
  other_surface_classification:
    - parameterized_control
    - derived_runtime_policy
    - internal_heuristic_or_implementation_detail
  evidence_state:
    - verified
    - inferred
    - unknown
  observability_grade:
    - A
    - B
    - C
  candidate_status:
    - eligible_now
    - eligible_with_guardrails
    - knowledge_only
    - blocked_by_observability
    - blocked_by_risk
    - blocked_by_budget_constraint
    - blocked_by_interaction_complexity
  scope:
    - session
    - tenant
    - node
    - cluster
  mutability:
    - immutable_after_boot
    - mutable_runtime
    - conditionally_mutable

required_fields:
  - canonical_key
  - display_name
  - unit_kind
  - control_surface_type
  - member_parameters
  - owning_module
  - scope
  - mutability
  - default_value_summary
  - allowed_range
  - impact_dimensions
  - positive_effects
  - risks
  - observability_evidence
  - attribution_notes
  - observability_grade
  - candidate_status
  - non_admission_reason
  - safe_operating_range
  - rollback_trigger
  - blast_radius
  - cooldown_window
  - tuning_preconditions
  - evidence_state

field_notes:
  canonical_key: Stable inventory key for the control_unit
  unit_kind: single_knob | family | bundle
  control_surface_type: Primary control surface for the control_unit
  member_parameters: Ordered list of concrete members and aliases
  observability_grade: Observability grade A/B/C derived from the rubric doc
  candidate_status: Admission status for future autotuning candidate review
  rollback_trigger: Trigger summary used by the rollback contract
  evidence_state: Per-entry summary state; individual nested fields may be stricter

member_parameter_template:
  name: string
  control_surface_type: config | system_param | session_param | other
  path_or_key: string
  other_surface_classification: parameterized_control
  default_value_summary: string
  evidence_state: verified

observability_evidence_template:
  discoverability:
    score: 0
    anchors: []
    evidence_state: unknown
  attribution:
    score: 0
    anchors: []
    confounders: []
    evidence_state: unknown
  sensitivity:
    score: 0
    anchors: []
    evidence_state: unknown
  guardrail_visibility:
    score: 0
    anchors: []
    evidence_state: unknown
  rollback_visibility:
    score: 0
    anchors: []
    evidence_state: unknown
  reviewer_confidence_note: string

example:
  canonical_key: family.system_param.streaming_parallelism
  display_name: Streaming parallelism family
  unit_kind: family
  control_surface_type: system_param
  member_parameters:
    - name: streaming_parallelism
      control_surface_type: system_param
      path_or_key: streaming_parallelism
      default_value_summary: default/adaptive
      evidence_state: verified
    - name: streaming_parallelism_for_source
      control_surface_type: session_param
      path_or_key: streaming_parallelism_for_source
      default_value_summary: default
      evidence_state: inferred
  owning_module: frontend + meta
  scope: cluster
  mutability: mutable_runtime
  default_value_summary: Global default plus type-specific overrides
  allowed_range: ConfigParallelism domain and adaptive strategy domain
  impact_dimensions:
    - stability
    - latency
    - resource_usage
    - throughput
  positive_effects:
    - Can bound or expand streaming parallelism within a fixed-budget envelope
  risks:
    - May increase contention or destabilize tail latency when attribution is weak
  observability_evidence:
    discoverability:
      score: 2
      anchors:
        - grafana/dashboard/user/streaming.py
      evidence_state: inferred
    attribution:
      score: 1
      anchors:
        - docs/dev/src/design/streaming-parallelism.md
      confounders:
        - Concurrent workload shifts
      evidence_state: inferred
    sensitivity:
      score: 1
      anchors: []
      evidence_state: unknown
    guardrail_visibility:
      score: 1
      anchors: []
      evidence_state: unknown
    rollback_visibility:
      score: 1
      anchors: []
      evidence_state: unknown
    reviewer_confidence_note: Needs exemplar calibration before grade A admission
  attribution_notes:
    - Prefer family-level reasoning over isolated single_knob tuning
  observability_grade: B
  candidate_status: eligible_with_guardrails
  non_admission_reason: Not grade A yet; needs stronger rollback anchors
  safe_operating_range: Keep within fixed-budget parallelism envelopes
  rollback_trigger:
    - Stability regression
    - Latency-tail regression
    - Resource-pressure breach
  blast_radius: Cluster-wide for streaming jobs that inherit the family defaults
  cooldown_window: Must outlast barrier and workload stabilization windows
  tuning_preconditions:
    - Fixed-budget constraints are preserved
    - A rollback contract is defined and reviewable
  evidence_state: inferred
