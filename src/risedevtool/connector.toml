extend = "common.toml"

[env]
# Look at the index for latest versions:
# https://downloads.apache.org/maven/maven-3/
MAVEN_VERSION = "3.9.14"
MAVEN_DOWNLOAD_PATH = "${PREFIX_TMP}/maven.tar.gz"

[tasks.download-maven]
private = true
category = "RiseDev - Components"
dependencies = ["prepare"]
condition = { env_set = [
  "ENABLE_BUILD_RW_CONNECTOR",
], files_not_exist = [
  "${PREFIX_BIN}/maven",
] }
description = "Download Maven"
script = '''
#!/usr/bin/env bash

set -euo pipefail

if !(command -v javac &> /dev/null && [[ "$(javac -version 2>&1 | awk '{print $2}' | cut -d. -f1)" -ge 11 ]]); then
  echo "JDK 11+ is not installed. Please install JDK 11+ first."
  exit 1
fi

if (command -v mvn &> /dev/null) || [ -d "${PREFIX_BIN}/maven" ]; then
    exit 0
else
    echo "Maven is not installed. Downloading now..."
    # Use `archive.apache.org` which permanently keeps all historical versions. `downloads.apache.org` only keeps
    # the latest patch of each Maven line, so a slightly stale MAVEN_VERSION would 404 there.
    MAVEN_URL="https://archive.apache.org/dist/maven/maven-3/${MAVEN_VERSION}/binaries/apache-maven-${MAVEN_VERSION}-bin.tar.gz"
    if ! curl -fsSL "${MAVEN_URL}" -o "${MAVEN_DOWNLOAD_PATH}"; then
        echo "Error: failed to download Maven from ${MAVEN_URL}"
        echo "Check the available versions at https://archive.apache.org/dist/maven/maven-3/"
        echo "or update MAVEN_VERSION (currently ${MAVEN_VERSION}) in src/risedevtool/connector.toml."
        exit 1
    fi
    tar -xzf "${MAVEN_DOWNLOAD_PATH}" -C "${PREFIX_TMP}"
    mv "${PREFIX_TMP}/apache-maven-${MAVEN_VERSION}" "${PREFIX_BIN}/maven"
    echo "Maven has been installed to ${PREFIX_BIN}."
fi
'''
