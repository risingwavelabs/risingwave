    create table t(a int, b int, c int, primary key(a, b));
    select * from t where a = 1 and b > 5;
  stream_plan: |-
    StreamMaterialize { columns: [a, b, c], stream_key: [a, b], pk_columns: [a, b], pk_conflict: NoCheck }
    └─StreamFilter { predicate: (t.a = 1:Int32) AND (t.b > 5:Int32) }
      └─StreamTableScan { table: t, columns: [t.a, t.b, t.c], pk_scan_range: a = Some(Int32(1)) AND b > Some(Int32(5)), stream_scan_type: SnapshotBackfill, stream_key: [t.a, t.b], pk: [a, b], dist: UpstreamHashShard(t.a, t.b) }
- name: snapshot backfill IN predicate produces UNION of scans
  sql: |
    create table t(a int, b int, c int, primary key(a, b));
    select * from t where a IN (1, 3, 5);
  stream_plan: |-
    StreamMaterialize { columns: [a, b, c, $src(hidden)], stream_key: [a, b, $src], pk_columns: [a, b, $src], pk_conflict: NoCheck }
    └─StreamUnion { all: true }
      ├─StreamExchange { dist: HashShard(t.a, t.b, 0:Int32) }
      │ └─StreamProject { exprs: [t.a, t.b, t.c, 0:Int32] }
      │   └─StreamFilter { predicate: (t.a = 1:Int32) }
      │     └─StreamTableScan { table: t, columns: [t.a, t.b, t.c], pk_scan_range: a = Some(Int32(1)), stream_scan_type: SnapshotBackfill, stream_key: [t.a, t.b], pk: [a, b], dist: UpstreamHashShard(t.a, t.b) }
      ├─StreamExchange { dist: HashShard(t.a, t.b, 1:Int32) }
      │ └─StreamProject { exprs: [t.a, t.b, t.c, 1:Int32] }
      │   └─StreamFilter { predicate: (t.a = 3:Int32) }
      │     └─StreamTableScan { table: t, columns: [t.a, t.b, t.c], pk_scan_range: a = Some(Int32(3)), stream_scan_type: SnapshotBackfill, stream_key: [t.a, t.b], pk: [a, b], dist: UpstreamHashShard(t.a, t.b) }
      └─StreamExchange { dist: HashShard(t.a, t.b, 2:Int32) }
        └─StreamProject { exprs: [t.a, t.b, t.c, 2:Int32] }
          └─StreamFilter { predicate: (t.a = 5:Int32) }
            └─StreamTableScan { table: t, columns: [t.a, t.b, t.c], pk_scan_range: a = Some(Int32(5)), stream_scan_type: SnapshotBackfill, stream_key: [t.a, t.b], pk: [a, b], dist: UpstreamHashShard(t.a, t.b) }
- name: snapshot backfill covering index selection
  sql: |
    create table t(a int, b int, c int, primary key(a));
    create index idx_b on t(b) include(a, c);
    select * from t where b = 1;
  stream_plan: |-
    StreamMaterialize { columns: [a, b, c], stream_key: [b, a], pk_columns: [b, a], pk_conflict: NoCheck }
    └─StreamFilter { predicate: (idx_b.b = 1:Int32) }
      └─StreamTableScan { table: idx_b, columns: [idx_b.a, idx_b.b, idx_b.c], pk_scan_range: b = Some(Int32(1)), stream_scan_type: SnapshotBackfill, stream_key: [idx_b.b, idx_b.a], pk: [b, a], dist: UpstreamHashShard(idx_b.b) }
- name: snapshot backfill covering index with IN predicate
  sql: |
    create table t(a int, b int, c int, primary key(a));
    create index idx_b on t(b) include(a, c);
    select * from t where b IN (1, 2, 3);
  stream_plan: |-
    StreamMaterialize { columns: [a, b, c, $src(hidden)], stream_key: [b, a, $src], pk_columns: [b, a, $src], pk_conflict: NoCheck }
    └─StreamUnion { all: true }
      ├─StreamExchange { dist: HashShard(idx_b.b, idx_b.a, 0:Int32) }
      │ └─StreamProject { exprs: [idx_b.a, idx_b.b, idx_b.c, 0:Int32] }
      │   └─StreamFilter { predicate: (idx_b.b = 1:Int32) }
      │     └─StreamTableScan { table: idx_b, columns: [idx_b.a, idx_b.b, idx_b.c], pk_scan_range: b = Some(Int32(1)), stream_scan_type: SnapshotBackfill, stream_key: [idx_b.b, idx_b.a], pk: [b, a], dist: UpstreamHashShard(idx_b.b) }
      ├─StreamExchange { dist: HashShard(idx_b.b, idx_b.a, 1:Int32) }
      │ └─StreamProject { exprs: [idx_b.a, idx_b.b, idx_b.c, 1:Int32] }
      │   └─StreamFilter { predicate: (idx_b.b = 2:Int32) }
      │     └─StreamTableScan { table: idx_b, columns: [idx_b.a, idx_b.b, idx_b.c], pk_scan_range: b = Some(Int32(2)), stream_scan_type: SnapshotBackfill, stream_key: [idx_b.b, idx_b.a], pk: [b, a], dist: UpstreamHashShard(idx_b.b) }
      └─StreamExchange { dist: HashShard(idx_b.b, idx_b.a, 2:Int32) }
        └─StreamProject { exprs: [idx_b.a, idx_b.b, idx_b.c, 2:Int32] }
          └─StreamFilter { predicate: (idx_b.b = 3:Int32) }
            └─StreamTableScan { table: idx_b, columns: [idx_b.a, idx_b.b, idx_b.c], pk_scan_range: b = Some(Int32(3)), stream_scan_type: SnapshotBackfill, stream_key: [idx_b.b, idx_b.a], pk: [b, a], dist: UpstreamHashShard(idx_b.b) }
- name: snapshot backfill multi-range OR predicate produces UNION of scans
  sql: |
    create table t(a int, b int, c int, primary key(a, b));
    select * from t where (a = 1 AND b > 10) OR (a = 2 AND b < 5);
  stream_plan: |-
    StreamMaterialize { columns: [a, b, c, $src(hidden)], stream_key: [a, b, $src], pk_columns: [a, b, $src], pk_conflict: NoCheck }
    └─StreamUnion { all: true }
      ├─StreamExchange { dist: HashShard(t.a, t.b, 0:Int32) }
      │ └─StreamProject { exprs: [t.a, t.b, t.c, 0:Int32] }
      │   └─StreamFilter { predicate: (t.a = 1:Int32) AND (t.b > 10:Int32) AND (((t.a = 1:Int32) AND (t.b > 10:Int32)) OR ((t.a = 2:Int32) AND (t.b < 5:Int32))) }
      │     └─StreamTableScan { table: t, columns: [t.a, t.b, t.c], pk_scan_range: a = Some(Int32(1)) AND b > Some(Int32(10)), stream_scan_type: SnapshotBackfill, stream_key: [t.a, t.b], pk: [a, b], dist: UpstreamHashShard(t.a, t.b) }
      └─StreamExchange { dist: HashShard(t.a, t.b, 1:Int32) }
        └─StreamProject { exprs: [t.a, t.b, t.c, 1:Int32] }
          └─StreamFilter { predicate: (t.a = 2:Int32) AND (t.b < 5:Int32) AND (((t.a = 1:Int32) AND (t.b > 10:Int32)) OR ((t.a = 2:Int32) AND (t.b < 5:Int32))) }
            └─StreamTableScan { table: t, columns: [t.a, t.b, t.c], pk_scan_range: a = Some(Int32(2)) AND b < Some(Int32(5)), stream_scan_type: SnapshotBackfill, stream_key: [t.a, t.b], pk: [a, b], dist: UpstreamHashShard(t.a, t.b) }
- name: |
    snapshot backfill overlapping ranges merge into single scan.
    TODO: scan range should be `a = 1 AND b >= 1 AND b <= 8` after merge, but currently
    only pushes `a = 1`. Root cause: expression simplification factors out `a = 1` before
    split_to_scan_ranges, leaving an OR on b that analyze_group cannot extract as a range.
    Fix: teach analyze_group in condition.rs to handle OR-of-ranges on a single PK column.
  sql: |
    create table t(a int, b int, c int, primary key(a, b));
    select * from t where (a = 1 AND b >= 1 AND b <= 5) OR (a = 1 AND b >= 3 AND b <= 8);
  stream_plan: |-
    StreamMaterialize { columns: [a, b, c], stream_key: [a, b], pk_columns: [a, b], pk_conflict: NoCheck }
    └─StreamFilter { predicate: (t.a = 1:Int32) AND (((t.b >= 1:Int32) AND (t.b <= 5:Int32)) OR ((t.b >= 3:Int32) AND (t.b <= 8:Int32))) }
      └─StreamTableScan { table: t, columns: [t.a, t.b, t.c], pk_scan_range: a = Some(Int32(1)), stream_scan_type: SnapshotBackfill, stream_key: [t.a, t.b], pk: [a, b], dist: UpstreamHashShard(t.a, t.b) }
- name: snapshot backfill partial merge with separate range produces UNION
  sql: |
    create table t(a int, b int, c int, primary key(a, b));
    select * from t where (a = 3 AND b >= 0 AND b <= 4) OR (a = 3 AND b >= 2 AND b <= 6) OR (a = 5 AND b = 5);
  stream_plan: |-
    StreamMaterialize { columns: [a, b, c, $src(hidden)], stream_key: [a, b, $src], pk_columns: [a, b, $src], pk_conflict: NoCheck }
    └─StreamUnion { all: true }
      ├─StreamExchange { dist: HashShard(t.a, t.b, 0:Int32) }
      │ └─StreamProject { exprs: [t.a, t.b, t.c, 0:Int32] }
      │   └─StreamFilter { predicate: (t.a = 3:Int32) AND (t.b >= 0:Int32) AND (t.b <= 6:Int32) AND (((((t.a = 3:Int32) AND (t.b >= 0:Int32)) AND (t.b <= 4:Int32)) OR (((t.a = 3:Int32) AND (t.b >= 2:Int32)) AND (t.b <= 6:Int32))) OR ((t.a = 5:Int32) AND (t.b = 5:Int32))) }
      │     └─StreamTableScan { table: t, columns: [t.a, t.b, t.c], pk_scan_range: a = Some(Int32(3)) AND b >= Some(Int32(0)) AND b <= Some(Int32(6)), stream_scan_type: SnapshotBackfill, stream_key: [t.a, t.b], pk: [a, b], dist: UpstreamHashShard(t.a, t.b) }
      └─StreamExchange { dist: HashShard(t.a, t.b, 1:Int32) }
        └─StreamProject { exprs: [t.a, t.b, t.c, 1:Int32] }
          └─StreamFilter { predicate: (t.a = 5:Int32) AND (t.b = 5:Int32) AND (((((t.a = 3:Int32) AND (t.b >= 0:Int32)) AND (t.b <= 4:Int32)) OR (((t.a = 3:Int32) AND (t.b >= 2:Int32)) AND (t.b <= 6:Int32))) OR ((t.a = 5:Int32) AND (t.b = 5:Int32))) }
            └─StreamTableScan { table: t, columns: [t.a, t.b, t.c], pk_scan_range: a = Some(Int32(5)) AND b = Some(Int32(5)), stream_scan_type: SnapshotBackfill, stream_key: [t.a, t.b], pk: [a, b], dist: UpstreamHashShard(t.a, t.b) }
- name: snapshot backfill index selection without explicit include
  sql: |
    create table t(a int, b int, c int, primary key(a));
    create index idx_b on t(b);
    select * from t where b = 1;
  stream_plan: |-
    StreamMaterialize { columns: [a, b, c], stream_key: [b, a], pk_columns: [b, a], pk_conflict: NoCheck }
    └─StreamFilter { predicate: (idx_b.b = 1:Int32) }
      └─StreamTableScan { table: idx_b, columns: [idx_b.a, idx_b.b, idx_b.c], pk_scan_range: b = Some(Int32(1)), stream_scan_type: SnapshotBackfill, stream_key: [idx_b.b, idx_b.a], pk: [b, a], dist: UpstreamHashShard(idx_b.b) }
- name: |
    Test backfill order, auto, stream share cycle.
    For auto derived backfill order with cycle, it should not return any order plan, and return a NOTICE
    to the user.
  sql: |
    create table fact1(v1 int);
    create table fact2(v1 int);
    create table fact3(v1 int);
    create table fact4(v1 int);
    create table dim1(v1 int);
    create table dim2(v1 int);
    create table dim3(v1 int);
    create table dim4(v1 int);
    with
        joined1 as (select fact1.v1 from fact1 left join dim1 on fact1.v1 = dim1.v1),
        joined2 as (select fact2.v1 from fact2 left join dim2 on fact2.v1 = dim2.v1),
        joined3 as (select fact3.v1 from fact3 left join dim3 on fact3.v1 = dim3.v1),
        joined12 as (select joined1.v1 from joined1 left join joined2 on joined1.v1 = joined2.v1),
        joined13 as (select joined1.v1 from joined1 left join joined3 on joined1.v1 = joined3.v1),
        joined1213 as (select joined12.v1 from joined12 left join joined13 on joined12.v1 = joined13.v1)
    select * from joined1213;
  stream_plan: |-
    StreamMaterialize { columns: [v1, fact1._row_id(hidden), dim1._row_id(hidden), fact2._row_id(hidden), dim2._row_id(hidden), fact1._row_id#1(hidden), dim1._row_id#1(hidden), fact1.v1(hidden), fact3._row_id(hidden), dim3._row_id(hidden)], stream_key: [fact1._row_id, dim1._row_id, v1, fact2._row_id, dim2._row_id, fact1._row_id#1, dim1._row_id#1, fact3._row_id, dim3._row_id], pk_columns: [fact1._row_id, dim1._row_id, v1, fact2._row_id, dim2._row_id, fact1._row_id#1, dim1._row_id#1, fact3._row_id, dim3._row_id], pk_conflict: NoCheck }
    └─StreamExchange { dist: HashShard(fact1.v1, fact1._row_id, dim1._row_id, fact2._row_id, dim2._row_id, fact1._row_id, dim1._row_id, fact3._row_id, dim3._row_id) }
      └─StreamHashJoin { type: LeftOuter, predicate: fact1.v1 = fact1.v1, output: [fact1.v1, fact1._row_id, dim1._row_id, fact2._row_id, dim2._row_id, fact1._row_id, dim1._row_id, fact1.v1, fact3._row_id, dim3._row_id] }
        ├─StreamHashJoin { type: LeftOuter, predicate: fact1.v1 = fact2.v1, output: [fact1.v1, fact1._row_id, dim1._row_id, fact2._row_id, dim2._row_id, fact2.v1] }
        │ ├─StreamShare { id: 4 }
        │ │ └─StreamHashJoin { type: LeftOuter, predicate: fact1.v1 = dim1.v1, output: [fact1.v1, fact1._row_id, dim1._row_id] }
        │ │   ├─StreamExchange { dist: HashShard(fact1.v1) }
        │ │   │ └─StreamTableScan { table: fact1, columns: [fact1.v1, fact1._row_id], stream_scan_type: SnapshotBackfill, stream_key: [fact1._row_id], pk: [_row_id], dist: UpstreamHashShard(fact1._row_id) }
        │ │   └─StreamExchange { dist: HashShard(dim1.v1) }
        │ │     └─StreamTableScan { table: dim1, columns: [dim1.v1, dim1._row_id], stream_scan_type: SnapshotBackfill, stream_key: [dim1._row_id], pk: [_row_id], dist: UpstreamHashShard(dim1._row_id) }
        │ └─StreamHashJoin { type: LeftOuter, predicate: fact2.v1 = dim2.v1, output: [fact2.v1, fact2._row_id, dim2._row_id] }
        │   ├─StreamExchange { dist: HashShard(fact2.v1) }
        │   │ └─StreamTableScan { table: fact2, columns: [fact2.v1, fact2._row_id], stream_scan_type: SnapshotBackfill, stream_key: [fact2._row_id], pk: [_row_id], dist: UpstreamHashShard(fact2._row_id) }
        │   └─StreamExchange { dist: HashShard(dim2.v1) }
        │     └─StreamTableScan { table: dim2, columns: [dim2.v1, dim2._row_id], stream_scan_type: SnapshotBackfill, stream_key: [dim2._row_id], pk: [_row_id], dist: UpstreamHashShard(dim2._row_id) }
        └─StreamHashJoin { type: LeftOuter, predicate: fact1.v1 = fact3.v1, output: [fact1.v1, fact1._row_id, dim1._row_id, fact3._row_id, dim3._row_id, fact3.v1] }
          ├─StreamShare { id: 4 }
          │ └─StreamHashJoin { type: LeftOuter, predicate: fact1.v1 = dim1.v1, output: [fact1.v1, fact1._row_id, dim1._row_id] }
          │   ├─StreamExchange { dist: HashShard(fact1.v1) }
          │   │ └─StreamTableScan { table: fact1, columns: [fact1.v1, fact1._row_id], stream_scan_type: SnapshotBackfill, stream_key: [fact1._row_id], pk: [_row_id], dist: UpstreamHashShard(fact1._row_id) }
          │   └─StreamExchange { dist: HashShard(dim1.v1) }
          │     └─StreamTableScan { table: dim1, columns: [dim1.v1, dim1._row_id], stream_scan_type: SnapshotBackfill, stream_key: [dim1._row_id], pk: [_row_id], dist: UpstreamHashShard(dim1._row_id) }
          └─StreamHashJoin { type: LeftOuter, predicate: fact3.v1 = dim3.v1, output: [fact3.v1, fact3._row_id, dim3._row_id] }
            ├─StreamExchange { dist: HashShard(fact3.v1) }
            │ └─StreamTableScan { table: fact3, columns: [fact3.v1, fact3._row_id], stream_scan_type: SnapshotBackfill, stream_key: [fact3._row_id], pk: [_row_id], dist: UpstreamHashShard(fact3._row_id) }
            └─StreamExchange { dist: HashShard(dim3.v1) }
              └─StreamTableScan { table: dim3, columns: [dim3.v1, dim3._row_id], stream_scan_type: SnapshotBackfill, stream_key: [dim3._row_id], pk: [_row_id], dist: UpstreamHashShard(dim3._row_id) }
  backfill_order_plan: |
    digraph G {
    }
