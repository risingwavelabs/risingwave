- id: separate_aggregation_and_sink
  sql: |
    set streaming_separate_sink to true;
    create table t (v1 date, v2 timestamp, v3 timestamp with time zone, v4 timestamp);
    create table sink_table (v1 date, v2 bigint);
    explain create sink s into sink_table as select v1, count(*) from t group by v1
    with (type = 'append-only', force_append_only = 'true');
  explain_output: |
    StreamProject { exprs: [t.v1, count, null:Serial] }
    └─StreamSink { type: append-only, columns: [v1, count] }
      └─StreamExchange [no_shuffle] { dist: HashShard(t.v1) }
        └─StreamHashAgg { group_key: [t.v1], aggs: [count] }
          └─StreamExchange { dist: HashShard(t.v1) }
            └─StreamTableScan { table: t, columns: [v1, _row_id] }
- id: separate_join_and_sink
  sql: |
    set streaming_separate_sink to true;
    create table t (v1 date, v2 timestamp, v3 timestamp with time zone, v4 timestamp);
    create table sink_table (v1 date, v2 timestamp);
    explain create sink s into sink_table as select t1.v1, t2.v2 from t t1 join t t2 on t1.v1 = t2.v1
    with (type = 'append-only', force_append_only = 'true');
  explain_output: |
    StreamProject { exprs: [t.v1, t.v2, null:Serial] }
    └─StreamSink { type: append-only, columns: [v1, v2, t._row_id(hidden), t._row_id#1(hidden)] }
      └─StreamExchange [no_shuffle] { dist: HashShard(t.v1) }
        └─StreamHashJoin { type: Inner, predicate: t.v1 = t.v1 }
          ├─StreamExchange { dist: HashShard(t.v1) }
          │ └─StreamTableScan { table: t, columns: [v1, _row_id] }
          └─StreamExchange { dist: HashShard(t.v1) }
            └─StreamTableScan { table: t, columns: [v1, v2, _row_id] }
- id: create_snapshot_free_sink_query_with_project_filter
  sql: |
    create table t (id int primary key, v1 int, v2 int);
    explain (verbose) create sink s as select id, v1 + 1 as v1 from t where v2 > 10
    with (connector = 'blackhole', snapshot = 'false');
  explain_output: |
    StreamSink { type: upsert, columns: [id, v1] }
    └─StreamProject { exprs: [t.id, (t.v1 + 1:Int32) as $expr1] }
      └─StreamFilter [upsert] { predicate: (t.v2 > 10:Int32) }
        └─StreamTableScan { table: t, columns: [t.id, t.v1, t.v2], stream_scan_type: UpstreamOnly, stream_key: [t.id], pk: [id], dist: UpstreamHashShard(t.id) }
