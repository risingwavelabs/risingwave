- name: test basic except
  sql: |
    create table t (v1 int, v2 int, v3 int);
    select * except (v1, v2) from t;
  expected_outputs:
  - stream_plan
  - batch_plan
- name: test multiple except
  sql: |
    create table t (v1 int, v2 int, v3 int);
    select * except (t.v1, t.v2), * except (v2, v3), * except (v1, v3) from t;
  expected_outputs:
  - batch_plan
  - stream_plan
- name: except on join
  sql: |
    create table t (v1 int, v2 int, v3 int);
    select * except (a.v2, b.v1, b.v3) from t a join t b on a.v1 = b.v1;
  expected_outputs:
  - batch_plan
  - stream_plan
- name: qualified wildcard
  sql: |
    create table t (v1 int, v2 int, v3 int);
    select a.* except (a.v2, a.v3), b.* except (b.v1) from t a join t b on a.v1 = b.v1;
  expected_outputs:
  - batch_plan
  - stream_plan
- name: qualified wildcard on schema-qualified relation
  sql: |
    create schema s;
    create table s.t (v1 int, v2 int, v3 int);
    select t.* except (t.v2) from s.t;
  expected_outputs:
  - batch_plan
  - stream_plan
- name: qualified wildcard on schema-qualified relation with join using
  sql: |
    create schema s;
    create table s.names (id int, name varchar);
    create table s.people (id int, version int, age int);
    select names.name, people.* except (people.version) from s.names join s.people using (id);
  expected_outputs:
  - batch_plan
  - stream_plan
- name: qualified wildcard argument on schema-qualified relation
  sql: |
    create schema s;
    create table s.t (v1 int, v2 int);
    select jsonb_agg(t.*) from s.t;
  expected_outputs:
  - batch_plan
  - stream_plan
- name: except with unknown column
  sql: |
    create table t (v1 int, v2 int, v3 int);
    select * except (v1, v4) from t;
  expected_outputs:
  - binder_error
- name: only allow using except with column name
  sql: |
    create table t (v1 int, v2 int, v3 int);
    select * except (1) from t;
  expected_outputs:
  - binder_error
- name: ambiguous column
  sql: |
    create table t (v1 int, v2 int);
    select * except (v1) from t t1 cross join t t2
  expected_outputs:
  - binder_error
