# Tests for ExprImpl::SecretRef — secret references in function call arguments.
# LocalFrontend does not support CREATE SECRET, so these verify binder errors.

- name: secret ref in built-in call — rejected before lookup
  sql: |
    SELECT concat('a', secret nonexistent_secret);
  expected_outputs:
  - binder_error

- name: secret ref with schema qualification in built-in call — rejected before lookup
  sql: |
    SELECT concat('a', secret my_schema.my_secret);
  expected_outputs:
  - binder_error

- name: multiple secret refs in built-in call — rejected before lookup
  sql: |
    SELECT concat(secret sec_a, secret sec_b);
  expected_outputs:
  - binder_error

- name: secret ref in nested built-in call — rejected before lookup
  sql: |
    SELECT upper(concat('a', secret missing));
  expected_outputs:
  - binder_error

- name: named function args are rejected gracefully
  sql: |
    SELECT concat(prefix => 'a', suffix => 'b');
  expected_outputs:
  - binder_error
