# Tests for ExprImpl::SecretRef — secret references in function call arguments.
# LocalFrontend does not support CREATE SECRET, so these verify binder errors.

- name: secret ref — secret not found
  sql: |
    SELECT concat('a', secret nonexistent_secret);
  expected_outputs:
  - binder_error

- name: secret ref with schema qualification — not found
  sql: |
    SELECT concat('a', secret my_schema.my_secret);
  expected_outputs:
  - binder_error

- name: multiple secret refs — not found
  sql: |
    SELECT concat(secret sec_a, secret sec_b);
  expected_outputs:
  - binder_error

- name: secret ref in nested call — not found
  sql: |
    SELECT upper(concat('a', secret missing));
  expected_outputs:
  - binder_error
