- name: MATCH_RECOGNIZE parses but is rejected by the binder (not yet supported)
  sql: |
    create table t(id int, ts timestamp, v int);
    select * from t match_recognize (
      partition by id
      order by ts
      measures count(*) as cnt
      one row per match
      after match skip past last row
      pattern (a b+ c?)
      define a as a.v > 0, b as b.v < 0, c as c.v = 0
    );
  expected_outputs:
    - binder_error
