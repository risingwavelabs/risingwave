- name: MATCH_RECOGNIZE without EMIT ON WINDOW CLOSE is rejected (the operator emits final-only; the plain form is reserved for a future emit-on-update mode)
  sql: |
    create table t(id int, ts int, v int, watermark for ts as ts - 10) append only;
    select * from t match_recognize (
      partition by id
      order by ts
      measures b.v as dip
      one row per match
      after match skip past last row
      pattern (a b)
      define a as a.v > 0, b as b.v < 0
    );
  expected_outputs:
    - stream_error
