- name: MATCH_RECOGNIZE plans end-to-end to a stream MatchRecognize node
  sql: |
    create table t(id int, ts int, v int, watermark for ts as ts - 10) append only;
    select * from t match_recognize (
      partition by id
      order by ts
      measures b.v as dip
      one row per match
      after match skip past last row
      pattern (a b)
      define a as a.v > 0, b as b.v < 0
    );
  expected_outputs:
    - logical_plan
    - stream_plan
- name: MATCH_RECOGNIZE with a CLASSIFIER() measure
  sql: |
    create table t(id int, ts int, v int, watermark for ts as ts - 10) append only;
    select * from t match_recognize (
      partition by id
      order by ts
      measures classifier() as cls, b.v as dip
      one row per match
      after match skip past last row
      pattern (a b)
      define a as a.v > 0, b as b.v < 0
    );
  expected_outputs:
    - logical_plan
    - stream_plan
- name: MATCH_RECOGNIZE stream planning requires a watermark on the leading ORDER BY column
  sql: |
    create table t(id int, ts int, v int) append only;
    select * from t match_recognize (
      partition by id
      order by ts
      measures b.v as dip
      one row per match
      after match skip past last row
      pattern (a b)
      define a as a.v > 0, b as b.v < 0
    );
  expected_outputs:
    - stream_error
