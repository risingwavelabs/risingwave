- name: MATCH_RECOGNIZE plans end-to-end to a stream MatchRecognize node (EMIT ON WINDOW CLOSE required)
  sql: |
    create table t(id int, ts int, v int, watermark for ts as ts - 10) append only;
    select * from t match_recognize (
      partition by id
      order by ts
      measures b.v as dip
      one row per match
      after match skip past last row
      pattern (a b)
      define a as a.v > 0, b as b.v < 0
    );
  expected_outputs:
    - logical_plan
    - eowc_stream_plan
- name: MATCH_RECOGNIZE with a CLASSIFIER() measure
  sql: |
    create table t(id int, ts int, v int, watermark for ts as ts - 10) append only;
    select * from t match_recognize (
      partition by id
      order by ts
      measures classifier() as cls, b.v as dip
      one row per match
      after match skip past last row
      pattern (a b)
      define a as a.v > 0, b as b.v < 0
    );
  expected_outputs:
    - logical_plan
    - eowc_stream_plan
- name: MATCH_RECOGNIZE with aggregate MEASURES over matched rows
  sql: |
    create table t(id int, ts int, v int, watermark for ts as ts - 10) append only;
    select * from t match_recognize (
      partition by id
      order by ts
      measures count(*) as n, min(a.v) as lo, max(a.v) as hi
      one row per match
      after match skip past last row
      pattern (a b)
      define a as a.v > 0, b as b.v < 0
    );
  expected_outputs:
    - logical_plan
    - eowc_stream_plan
