- name: MATCH_RECOGNIZE WITHIN rejects an input column reference (would evaluate against a synthetic order-key row and crash)
  sql: |
    create table t(id int, ts int, v int, watermark for ts as ts - 10) append only;
    select * from t match_recognize (
      partition by id
      order by ts
      measures b.v as dip
      one row per match
      after match skip past last row
      pattern (a b) within v
      define a as a.v > 0, b as b.v < 0
    );
  expected_outputs:
    - binder_error
- name: MATCH_RECOGNIZE WITHIN rejects a non-constant expression over an input column
