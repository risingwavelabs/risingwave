- sql: |
    create table hasura_t (id int primary key, v int);
    select pg_catalog.pg_relation_is_updatable('hasura_t'::regclass, true);
  expected_outputs:
  - batch_plan
- sql: |
    create table hasura_t (id int primary key, v int);
    create view hasura_v as select * from hasura_t;
    select ((pg_catalog.pg_relation_is_updatable('hasura_v'::regclass, true) & 4) = 4) as is_updatable,
           ((pg_catalog.pg_relation_is_updatable('hasura_v'::regclass, true) & 8) = 8) as is_insertable,
           ((pg_catalog.pg_relation_is_updatable('hasura_v'::regclass, true) & 16) = 16) as is_deletable;
  expected_outputs:
  - batch_plan
- sql: |
    create source hasura_s (id int)
    with (connector = 'kafka', topic = 'hasura', properties.bootstrap.server = 'localhost:9092', scan.startup.mode = 'earliest')
    format plain encode json;
    select pg_catalog.pg_relation_is_updatable('hasura_s'::regclass, true);
  expected_outputs:
  - batch_plan
- sql: |
    create table hasura_defaults (
      id int primary key,
      required_v int not null,
      optional_v int default 42,
      required_default_v int not null default 7
    );
    select attname, attnotnull, atthasdef
    from pg_catalog.pg_attribute
    where attrelid = 'hasura_defaults'::regclass
      and attname in ('id', 'required_v', 'optional_v', 'required_default_v')
    order by attnum;
  expected_outputs:
  - batch_plan
- sql: |
    select typname, typcategory
    from pg_catalog.pg_type
    where typname in ('int4', '_int4', 'varchar', 'bool', 'timestamp', 'interval', 'jsonb')
    order by typname;
  expected_outputs:
  - batch_plan
- sql: |
    select proname,
           provolatile,
           proretset,
           proargtypes,
           proargnames,
           pronargdefaults
    from pg_catalog.pg_proc
    limit 10;
  expected_outputs:
  - batch_plan
- sql: |
    select aggfnoid
    from pg_catalog.pg_aggregate
    limit 10;
  expected_outputs:
  - batch_plan
- sql: |
    select pg_catalog.pg_get_functiondef(42);
  expected_outputs:
  - batch_plan
