- id: create_source
  sql: |
    CREATE SOURCE s(x int,y int)
    WITH(
        connector='kafka',
        topic = 'mytopic',
        properties.bootstrap.server = '6',
        scan.startup.mode = 'earliest',
    ) FORMAT PLAIN ENCODE JSON;
  expected_outputs: []
- with_config_map:
    streaming_use_shared_source: true
  sql: |
    /* The shared source config doesn't affect table with connector. */
    EXPLAIN CREATE TABLE s(x int,y int)
    WITH(
        connector='kafka',
        topic = 'mytopic',
        properties.bootstrap.server = '6',
        scan.startup.mode = 'earliest',
    ) FORMAT PLAIN ENCODE JSON;
  expected_outputs:
    - explain_output
# Note: The execution order is first apply config, then execute "before", then execute "sql"
# We use with_config_map to control the config when CREATE SOURCE, and use another SET statement to change the config for CREATE MV
#
# batch: All 4 plans should be the same.
# stream: StreamSourceScan (with backfill) should be used only for the last 2. The first 2 use StreamSource. streaming_use_shared_source changes the behavior of CREATE SOURCE, but not CREATE MATERIALIZED VIEW
- with_config_map:
    streaming_use_shared_source: false
  before:
    - create_source
  sql: |
    SET streaming_use_shared_source = false;
    select * from s;
  expected_outputs:
    - batch_plan
    - stream_plan
- with_config_map:
    streaming_use_shared_source: false
  before:
    - create_source
  sql: |
    SET streaming_use_shared_source = true;
    select * from s;
  expected_outputs:
    - batch_plan
    - stream_plan
- with_config_map:
    streaming_use_shared_source: true
  before:
    - create_source
  sql: |
    SET streaming_use_shared_source = false;
    select * from s;
  expected_outputs:
    - batch_plan
    - stream_plan
- with_config_map:
    streaming_use_shared_source: true
  before:
    - create_source
  sql: |
    SET streaming_use_shared_source = true;
    select * from s;
  expected_outputs:
    - batch_plan
    - stream_plan
- with_config_map:
    streaming_use_shared_source: true
  before:
    - create_source
  sql: |
    CREATE TABLE t(x int,y int);
    set streaming_use_snapshot_backfill = true;
    select * from s union select * from t;
  expected_outputs:
    - logical_plan
    - stream_plan
# CREATE TABLE FROM source: should use StreamSourceScan (source backfill) with shared source
- with_config_map:
    streaming_use_shared_source: true
  before:
    - create_source
  sql: |
    EXPLAIN CREATE TABLE t(x int, y int) FROM s;
  expected_outputs:
    - explain_output
# CREATE TABLE FROM source: table-defined generated columns
- with_config_map:
    streaming_use_shared_source: true
  before:
    - create_source
  sql: |
    EXPLAIN CREATE TABLE t(x int, y int, z int AS x + y) FROM s;
  expected_outputs:
    - explain_output
# CREATE TABLE FROM source: wildcard inherits columns from source
- with_config_map:
    streaming_use_shared_source: true
  before:
    - create_source
  sql: |
    EXPLAIN CREATE TABLE t(*) FROM s;
  expected_outputs:
    - explain_output
# CREATE TABLE FROM source: error when source has generated columns
- id: create_source_with_gen_col
  sql: |
    CREATE SOURCE s_gen(x int, y int, z int AS x + y)
    WITH(
        connector='kafka',
        topic = 'mytopic',
        properties.bootstrap.server = '6',
        scan.startup.mode = 'earliest',
    ) FORMAT PLAIN ENCODE JSON;
  expected_outputs: []
- with_config_map:
    streaming_use_shared_source: true
  before:
    - create_source_with_gen_col
  sql: |
    CREATE TABLE t(x int, y int, z int) FROM s_gen;
  expected_outputs:
    - planner_error
# CREATE TABLE FROM source: error when source is not shared
- with_config_map:
    streaming_use_shared_source: false
  before:
    - create_source
  sql: |
    CREATE TABLE t(x int, y int) FROM s;
  expected_outputs:
    - planner_error
