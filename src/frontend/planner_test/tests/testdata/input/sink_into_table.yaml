- id: create sink into table having default expression with now()
  sql: |
    create table t(
        x int,
        y timestamptz default now(),
        z timestamptz default now() - interval '1 minute'
    ) append only;
    create table s(x int) append only;
    explain create sink ss into t from s with (type = 'append-only');
  expected_outputs:
    - explain_output
- sql: |
    create table t1 (a int primary key, b int);
    create table t2 (a int, b int primary key);
    explain create sink s into t1 from t2;
  expected_outputs:
    - explain_output
- id: create sink into table with target table locality backfill
  sql: |
    set enable_locality_backfill = true;
    create table t1 (a int primary key, b int);
    create table t2 (a int, b int primary key);
    explain create sink s into t1 from t2;
  expected_outputs:
    - explain_output
- id: create sink into table with target table locality backfill and explicit column mapping
  sql: |
    set enable_locality_backfill = true;
    create table t1 (a int, b int, c int default 0, primary key (b, a));
    create table t2 (x int primary key, y int);
    explain create sink s into t1(b, a) as select y, x from t2;
  expected_outputs:
    - explain_output
- sql: |
    create table t1 (a int primary key, b int);
    create table t2 (a int, b int primary key);
    explain create sink s into t1 as select b from t2;
  expected_outputs:
    - explain_output
- id: create decoupled sink into table
  sql: |
    create table t1 (a int primary key, b int);
    create table t2 (a int, b int primary key);
    set sink_decouple = true;
    explain create sink s into t1 from t2;
  expected_outputs:
    - explain_output
